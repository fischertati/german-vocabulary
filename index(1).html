<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Vocabulary Trainer</title>
<style>
body{font-family:Arial,sans-serif;background:#f4f7fb;margin:0;padding:20px}
.card{max-width:800px;margin:auto;background:#fff;border-radius:16px;padding:20px;box-shadow:0 8px 20px rgba(0,0,0,.1)}
button{display:block;width:100%;margin:8px 0;padding:14px;border:0;border-radius:12px;background:#4f8ef7;color:#fff;font-size:18px;cursor:pointer}
button:hover{opacity:.9}.ok{background:#27ae60!important}.bad{background:#e74c3c!important}
#opts button{background:#eef3ff;color:#222}
.progress{height:10px;background:#ddd;border-radius:99px;overflow:hidden;margin:15px 0}
.bar{height:100%;background:#27ae60;width:0%}
</style>
</head>
<body>
<div class="card">
<h2>🎯 Find the Match (демо-шаблон)</h2>
<div class="progress"><div class="bar" id="bar"></div></div>
<h1 id="word"></h1>
<div id="opts"></div>
<button onclick="speechSynthesis.speak(new SpeechSynthesisUtterance(cur.en))">🔊 Произнести</button>
</div>
<script>
const vocabulary=[
{en:"föhnen",ru:"сушить волосы феном"},
{en:"Babyparty",ru:"вечеринка в честь будущего ребёнка"},
{en:"schwanger",ru:"беременная"},
{en:"die Überraschung",ru:"сюрприз"},
{en:"sich kümmern",ru:"заботиться"},
{en:"unglaublich",ru:"невероятный"},
{en:"das Geschlecht",ru:"пол"},
{en:"die Aufmerksamkeit",ru:"внимание"},
{en:"die Konferenz",ru:"конференция"},
{en:"leer sein",ru:"разрядился"},
{en:"der Akku",ru:"аккумулятор"}
];
let words=[...vocabulary].sort(()=>Math.random()-.5),i=0,cur;
function show(){
 if(i>=words.length){document.body.innerHTML="<div class='card'><h1>🎉 Отлично!</h1><p>Упражнение завершено.</p></div>";return;}
 cur=words[i];
 word.textContent=cur.en;
 let arr=vocabulary.map(x=>x.ru).sort(()=>Math.random()-.5);
 if(!arr.includes(cur.ru))arr[0]=cur.ru;
 arr=arr.slice(0,Math.min(6,arr.length));
 if(!arr.includes(cur.ru))arr[Math.floor(Math.random()*arr.length)]=cur.ru;
 arr.sort(()=>Math.random()-.5);
 opts.innerHTML="";
 arr.forEach(t=>{
 let b=document.createElement("button");
 b.textContent=t;
 b.onclick=()=>{
  if(t===cur.ru){b.className="ok";i++;bar.style.width=(i/words.length*100)+"%";setTimeout(show,500);}
  else{b.className="bad";setTimeout(()=>b.className="",400);}
 };
 opts.appendChild(b);
 });
}
show();
</script>
</body>
</html>
